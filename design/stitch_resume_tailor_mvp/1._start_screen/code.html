<script>
        // Micro-interaction for the button
        const startBtn = document.querySelector('button');
        startBtn.addEventListener('click', () => {
            startBtn.classList.add('scale-95');
            setTimeout(() => {
                startBtn.classList.remove('scale-95');
                // Potential navigation logic
                console.log('Navigating to onboarding...');
            }, 100);
        });

        // Dynamic background parallax effect on device tilt or mouse move
        document.addEventListener('mousemove', (e) => {
            const shapes = document.querySelectorAll('.float-animation');
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            
            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 20;
                shape.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
